fragment PostParts on Post {
  __typename
  title
  excerpt
  date
  category
  tags
  linkedInUrl
  featured
  body
}

fragment HomePageParts on HomePage {
  __typename
  heroBadgeText
  heroHeadline
  heroHeadlineAccent
  heroSubtext
  heroPrimaryButtonText
  heroPrimaryButtonHref
  heroSecondaryButtonText
  positioningItems {
    __typename
    icon
    label
    desc
  }
  featuredSectionLabel
  featuredSectionHeading
  postTypesSectionLabel
  postTypesSectionHeading
  latestSectionLabel
  latestSectionHeading
}

fragment AboutPageParts on AboutPage {
  __typename
  seoTitle
  seoDescription
  sectionLabel
  headline
  headlineAccent
  intro
  primaryButtonText
  primaryButtonHref
  secondaryButtonText
  body
}

fragment SiteSettingsParts on SiteSettings {
  __typename
  siteName
  siteTagline
  linkedInUrl
  betaBadge
  navItems {
    __typename
    label
    href
  }
  siteMetaTitle
  siteMetaDescription
}

fragment NewsletterCTAParts on NewsletterCTA {
  __typename
  badgeText
  headline
  subtext
  emailPlaceholder
  buttonText
  successMessage
  linkedInNudge
}

fragment FooterParts on Footer {
  __typename
  brandTagline
  staySectionLabel
  staySectionText
  linkedInButtonText
  copyrightSuffix
  builtByLine
}
